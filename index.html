<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Instructor Station Kiosk</title>
  <meta name="theme-color" content="#1a1a2e">
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #1a1a2e; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .loading {
      text-align: center;
    }
    .loading h1 {
      font-size: 1.5rem; font-weight: 400; margin-bottom: 1rem;
    }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 1rem;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sub {
      font-size: 0.85rem; color: #888; max-width: 400px; margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <h1>Instructor Station Kiosk</h1>
    <p class="sub">
      Waiting for extension redirect&hellip;<br>
      If this page persists, the kiosk extension may not be installed.
    </p>
  </div>
</body>
</html>
