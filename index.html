<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Instructor Station Kiosk</title>
  <meta name="theme-color" content="#1a1a2e">
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #1a1a2e; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #ext-frame {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;
    }
    #fallback {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      align-items: center; justify-content: center; text-align: center;
    }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 1rem;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4fc3f7; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sub { font-size: 0.85rem; color: #888; max-width: 400px; margin: 0 auto; }
  </style>
</head>
<body>
  <iframe id="ext-frame"
          src="chrome-extension://ffcoooniadfdngdceeiopbkdljcgnoha/index.html"
          allow="screen-wake-lock; fullscreen; autoplay"
          allowfullscreen></iframe>
  <div id="fallback">
    <div>
      <div class="spinner"></div>
      <h1 style="font-size:1.5rem;font-weight:400;margin-bottom:1rem">Instructor Station Kiosk</h1>
      <p class="sub">
        Extension not available.<br>
        Ensure the IOS Kiosk extension (ffcoooniadfdngdceeiopbkdljcgnoha) is installed.
      </p>
    </div>
  </div>
  <script src="loader.js"></script>
</body>
</html>
